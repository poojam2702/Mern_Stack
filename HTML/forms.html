<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forms</title>
</head>
<body>
    <h2>forms in html:</h2>
    <form action="">

   <label for="fname">first name</label>
    <input type="text" minlength="5" maxlength="12">
    <br><br>
    <label for="age">Age:</label>
    <input type="number"> 
    <label for="mail">email:</label>
    <input type="email">
    <br>
    <label for="date">date of joining</label>
    <input type="date">
    <br>
    <label for="">password</label>
    <input type="password">
    <br>
   <p>enter your gender</p>
    <input type="radio" name="gender" id="male"><label for="male">male</label>
    <input type="radio" name="gender" id="female"><label for="female">female</label>
    <input type="radio" name="gender" id="other"><label for="other">other</label>
    <br>
    <label for="">select ur fav color</label>
    <input type="color">
    <br>
     
    <br>


    <label for="paymentOption">select payment method</label>
    <select name="payment" id="paymentOption">
        <option value="gpay">gpay</option>
    </select>
    <label for="cmts">please provide feedback</label>
    <textarea name="cmt" id="cmts" rows="5" cols="5  "></textarea>
    <input type="reset">
    <input type="submit ">
    </form>

</body>
</html>
